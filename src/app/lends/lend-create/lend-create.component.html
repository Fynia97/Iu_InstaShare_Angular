<div class="container" *ngIf="lend">
    <form [formGroup]="lendForm" (ngSubmit)="onSubmit()">
        <!--LendFrom-->
        <div class="input-group mb-3">
            <input type="date" formControlName="lendFrom">
        </div>

        <!--LendTo-->
        <div class="input-group mb-3">
            <input type="date" formControlName="lendTo">
        </div>

        <!--Note-->
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Notiz" formControlName="note">
        </div>

        <!--Submit-->
        <button class="btn btn-primary submit" type="submit">Speichern</button>
    </form>

    <button class="btn btn-light" style="float: right;" (click)="cancel()">Abbrechen</button>

</div>

<main>
    <body>
         <div class="container">
            <div class="header">
                <button class="borrow-button">Ausleihen</button>
                <span class="close-button" onclick="closeContainer()">X</span>
            </div>
            <div class="row">
                <div class="column">
                    <!--<img src="bild.jpg" alt="Buchbild">-->
                </div>
                <div class="column">
                    <div>
                        <label for="title">Titel:</label>
                        <span id="title">Harry Potter und der Gefangene von Askaban</span>
                    </div>
                    <div>
                        <label for="author">Autor:</label>
                        <span id="author">Max Mustermann</span>
                    </div>
                    <div>
                        <label for="category">Kategorie:</label>
                        <span id="category">Fantasy</span>
                    </div>
                    <div>
                        <label for="isbn">ISBN:</label>
                        <span id="isbn">978-3-16-148410-0</span>
                    </div>
                    <div>
                        <label for="year">Erscheinungsjahr:</label>
                        <span id="year">2002</span>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="column">
                    <div>
                        <label for="status">Status:</label>
                        <span id="status">Verfügbar</span>
                    </div>
                    <div>
                        <label for="borrower">Ausgeliehen an:</label>
                        <span id="borrower">N/A</span>
                    </div>
                    <div>
                        <label for="return-date">Rückgabe am:</label>
                        <span id="return-date">N/A</span>
                    </div>
                </div>
            </div>
        </div>
            <script>
                function closeContainer() {
                    document.querySelector('.container').style.display = 'none';
                }
            </script>
    </body>
</main>
